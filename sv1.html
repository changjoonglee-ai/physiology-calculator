<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1회박출량 계산기</title>

<style>

body{
    font-family: Arial, "맑은 고딕", sans-serif;
    background:#eef3f8;
    margin:0;
    padding:30px;
}

.container{
    max-width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#0066aa;
}

p{
    line-height:1.6;
}

label{
    display:block;
    margin-top:18px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    margin-top:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:8px;
    background:#1976d2;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.result{
    margin-top:30px;
    background:#f3f9ff;
    padding:20px;
    border-radius:10px;
}

.value{
    font-size:34px;
    color:#d32f2f;
    font-weight:bold;
}

.message{
    margin-top:15px;
    font-size:18px;
}

.footer{
    margin-top:30px;
    color:gray;
    font-size:14px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>🫀 1회박출량 계산기</h1>

<p>
확장기말 용적(EDV)과 수축기말 용적(ESV)을 입력하면
1회박출량(SV)과 박출률(EF)을 자동으로 계산합니다.
</p>

<label>확장기말 용적 (EDV, mL)</label>
<input type="number" id="edv" placeholder="예 : 120">

<label>수축기말 용적 (ESV, mL)</label>
<input type="number" id="esv" placeholder="예 : 50">

<button onclick="calculate()">계산하기</button>

<div class="result">

<h2>계산 결과</h2>

<p><strong>1회박출량 (SV)</strong></p>

<div class="value" id="sv">-</div>

<p><strong>박출률 (EF)</strong></p>

<div class="value" id="ef">-</div>

<div class="message" id="message"></div>

</div>

<div class="footer">

SV = EDV − ESV<br>
EF = (SV ÷ EDV) × 100

</div>

</div>

<script>

function calculate(){

let edv=parseFloat(document.getElementById("edv").value);
let esv=parseFloat(document.getElementById("esv").value);

if(isNaN(edv) || isNaN(esv)){
    alert("EDV와 ESV를 모두 입력하십시오.");
    return;
}

if(edv<=0){
    alert("EDV는 0보다 커야 합니다.");
    return;
}

if(esv<0){
    alert("ESV는 0 이상이어야 합니다.");
    return;
}

if(esv>edv){
    alert("ESV는 EDV보다 클 수 없습니다.");
    return;
}

let sv=edv-esv;
let ef=(sv/edv)*100;

document.getElementById("sv").innerHTML=
sv.toFixed(1)+" mL";

document.getElementById("ef").innerHTML=
ef.toFixed(1)+" %";

let msg="";

if(sv>=60 && sv<=100)
    msg+="✅ 1회박출량은 일반적인 정상 범위(60~100 mL)입니다.<br>";
else
    msg+="⚠️ 1회박출량이 일반적인 정상 범위를 벗어났습니다.<br>";

if(ef>=55 && ef<=70)
    msg+="✅ 박출률은 정상 범위(55~70%)입니다.";
else if(ef<55)
    msg+="⚠️ 박출률이 낮습니다.";
else
    msg+="⚠️ 박출률이 높은 편입니다.";

document.getElementById("message").innerHTML=msg;

}

</script>

</body>
</html>
