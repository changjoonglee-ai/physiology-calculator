<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Poiseuille's Law 혈류량 계산기</title>

<style>
body{
    font-family:Arial;
    background:#f4f8fb;
    margin:40px;
}

.container{
    max-width:650px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    color:#005792;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    font-size:18px;
    background:#0078D7;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#005fa3;
}

.result{
    margin-top:25px;
    padding:20px;
    background:#eef7ff;
    border-radius:10px;
    font-size:18px;
}

.note{
    margin-top:20px;
    font-size:14px;
    color:#555;
}
</style>

</head>
<body>

<div class="container">

<h2>Poiseuille's Law 혈류량 계산기</h2>

<label>혈압차 ΔP (Pa)</label>
<input type="number" id="pressure" value="1333">

<label>혈관 반지름 r (mm)</label>
<input type="number" id="radius" value="2">

<label>혈관 길이 L (cm)</label>
<input type="number" id="length" value="10">

<label>혈액 점도 η (Pa·s)</label>
<input type="number" step="0.001" id="viscosity" value="0.0035">

<button onclick="calculate()">계산하기</button>

<div class="result" id="result">

혈류량이 표시됩니다.

</div>

<div class="note">

<b>사용 단위</b><br><br>

ΔP : Pa<br>
r : mm<br>
L : cm<br>
η : Pa·s<br><br>

결과는 m³/s 와 mL/min으로 표시됩니다.

</div>

</div>

<script>

function calculate(){

let dp=parseFloat(document.getElementById("pressure").value);

let r=parseFloat(document.getElementById("radius").value)/1000;

let L=parseFloat(document.getElementById("length").value)/100;

let eta=parseFloat(document.getElementById("viscosity").value);

let Q=(Math.PI*dp*Math.pow(r,4))/(8*eta*L);

let mlmin=Q*1000000*60;

document.getElementById("result").innerHTML=
"<b>혈류량(Q)</b><br><br>"+
Q.toExponential(5)+" m³/s<br><br>"+
mlmin.toFixed(2)+" mL/min";

}

</script>

</body>
</html>
